on:
  workflow_call:
    inputs:
      working_directory:
        required: false
        type: string
        default: "."
      use_no_optional:
        required: false
        type: boolean
        default: true
      package_manager:
        required: false
        type: string
        default: "npm"

jobs:
  Build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      # Setup
      - uses: actions/checkout@v3
      # Activate pnpm via Corepack (a plain run step) instead of a Marketplace
      # action so consumers don't need to allowlist a third-party action. The
      # pnpm version is taken from the consumer's package.json "packageManager"
      # field. Skipped entirely for npm consumers.
      - name: Using PNPM
        if: ${{ inputs.package_manager == 'pnpm' }}
        run: corepack enable
      - name: Using Node.js
        uses: actions/setup-node@v3
        with:
          node-version-file: .nvmrc
          cache: ${{ inputs.package_manager == 'pnpm' && 'pnpm' || '' }}
          cache-dependency-path: ${{ inputs.package_manager == 'pnpm' && format('{0}/pnpm-lock.yaml', inputs.working_directory) || '' }}

      # Install
      - name: Install (npm)
        if: ${{ inputs.package_manager == 'npm' }}
        run: npm ci ${{ inputs.use_no_optional && '--no-optional' || '' }}
      - name: Install (pnpm)
        if: ${{ inputs.package_manager == 'pnpm' }}
        run: pnpm install --frozen-lockfile ${{ inputs.use_no_optional && '--no-optional' || '' }}

      # Lint
      - run: ${{ inputs.package_manager }} run lint

      # Build
      - run: ${{ inputs.package_manager }} run build

      # Package
      - run: ${{ inputs.package_manager }} run package
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: "Artifacts-${{ inputs.working_directory }}"
          path: |
            **/*.vsix
            **/*.tgz
            !**/node_modules

      # Test
      - run: xvfb-run -a ${{ inputs.package_manager }} test
