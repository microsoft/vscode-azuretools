parameters:
  - name: "jobs"
    type: object
    default:
      - name: Root
        working_directory: .
  - name: "useAzureFederatedCredentials"
    type: boolean
    default: false
  - name: bamiServiceConnectionName
    type: string
    default: AzCodeE2ETests
  - name: bamiVariablesGroupName
    type: string
    default: AzCode-BAMI-Variables
  - name: additionalSetupSteps
    type: stepList
    default: []
  # Azure Artifacts feed for a private NPM mirror
  - name: npmFeed
    type: string
    default: DevDiv/azcode
  - name: additionalPostPackageSteps
    type: stepList
    default: []
  - name: enableSigning
    type: boolean
    default: True
  - name: vsixFileNames
    type: object
    default: [""]
stages:
  - stage: BuildStage
    pool:
      name: AzurePipelines-EO
      image: 1ESPT-Ubuntu22.04
      os: linux
    jobs:
      - ${{ each job in parameters.jobs }}:
          - job: ${{ job.name }}
            templateContext:
              mb: # Enable the MicroBuild Signing toolset
                signing:
                  enabled: ${{ parameters.enableSigning }}
                  signType: real # options are 'real' & 'test'
                  signWithProd: true
                  zipSources: false
                  azureSubscription: "MicroBuild Signing Task (DevDiv)"
              outputs:
                - output: pipelineArtifact
                  targetPath: $(build.artifactstagingdirectory)/build/$(artifact_name)
                  artifactName: Build $(artifact_name)
            steps:
              - pwsh: |
                  Write-Host "##vso[task.logissue type=warning]The 'azure-pipelines' templates in microsoft/vscode-azuretools are deprecated and will be removed in a future release. Please migrate to the new 'azdo-pipelines' templates. See https://github.com/microsoft/vscode-azuretools/blob/main/azdo-pipelines/MIGRATION.md for migration instructions."
                displayName: "\U000026A0 Deprecation Warning"
              - template: ./templates/setup.yml
                parameters:
                  additionalSetupSteps: ${{ parameters.additionalSetupSteps }}
                  npmFeed: ${{ parameters.npmFeed }}
              - template: ./templates/build.yml
              - template: ./templates/1espackage.yml
                parameters:
                  additionalPostPackageSteps: ${{ parameters.additionalPostPackageSteps }}
              - template: ./templates/sign.yml
                parameters:
                  enableSigning: ${{ parameters.enableSigning }}
                  vsixFileNames: ${{ parameters.vsixFileNames }}
                  workingDirectory: ${{ job.working_directory }}
                  npmFeed: ${{ parameters.npmFeed }}

              - template: ./templates/stage-artifacts.yml
              - template: ./templates/test.yml
                parameters:
                  useAzureFederatedCredentials: ${{ parameters.useAzureFederatedCredentials }}
                  bamiServiceConnectionName: ${{ parameters.bamiServiceConnectionName }}
            variables:
              - name: artifact_name
                value: ${{ replace(job.name, '_', '-') }}
              - name: working_directory
                value: ${{ job.working_directory }}
              - group: ${{ parameters.bamiVariablesGroupName }}
