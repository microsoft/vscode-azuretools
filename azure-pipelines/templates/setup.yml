parameters:
  - name: additionalSetupSteps
    type: stepList
    default: []

steps:
  - script: |
      if [ ! -f .nvmrc ]; then
        echo "##vso[task.logissue type=error].nvmrc file not found. Please add a .nvmrc file to the root of your repository."
        exit 1
      fi
      NODE_VERSION=$(cat .nvmrc)
      echo "##vso[task.setvariable variable=nodeVersion]$NODE_VERSION"
    displayName: "\U0001F449 Read Node version from .nvmrc"
    condition: succeeded()

  - task: UseNode@1
    displayName: "\U0001F449 Using Node.js"
    inputs:
      version: $(nodeVersion)
    condition: succeeded()

  - task: Npm@1
    displayName: "\U0001F449 Install Dependencies"
    inputs:
      command: custom
      customCommand: ci --no-optional
      workingDir: $(working_directory)
    condition: succeeded()

  - bash: |
      /usr/bin/Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
      echo ">>> Started xvfb"
    displayName: "\U0001F449 Start X Virtual Frame Buffer"
    condition: and(succeeded(), eq(variables['Agent.OS'], 'Linux'))

  - ${{ parameters.additionalSetupSteps }}
