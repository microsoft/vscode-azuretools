parameters:
  # Set to true for official builds, false for PRs and other unofficial builds
  - name: isOfficialBuild
    type: boolean
    default: true

  # The jobs to run. Use to parallelize building in subdirectories
  - name: jobs
    type: object
    default:
      - name: Root
        working_directory: .

  # The pool to use for the SDL stage
  - name: sdlPool
    type: object
    default:
      name: VSEngSS-MicroBuild2022-1ES
      image: server2022-microbuildVS2022-1es
      os: windows

  # The pool to use for the build stage
  - name: buildPool
    type: object
    default:
      name: AzurePipelines-EO
      image: 1ESPT-Ubuntu22.04
      os: linux

  # Set to 'real' or 'test' to enable MicroBuild signing
  - name: signType
    type: string
    values:
      - real
      - test
      - none
    default: real

  # Supply to disable MicroBuild signing steps and use these instead
  - name: alternativeSigningSteps
    type: stepList
    default: []

  # Additional steps to run during setup (e.g. npm authenticate etc.)
  - name: additionalSetupSteps
    type: stepList
    default: []

  # Set to the ARM service connection name to enable tests with Azure federated credentials
  - name: testARMServiceConnection
    type: string
    default: ""

  # Package manager used for install/build/lint/package/test. The same set of
  # script commands (`<pm> run lint|build|package|test`) runs either way; only
  # the install command and pnpm's Corepack activation differ.
  #   'npm'  (default): `npm ci` then `npm run <script>`.
  #   'pnpm':           Corepack activates the version pinned by the consumer's
  #                     package.json "packageManager" field, then
  #                     `pnpm ci` and `pnpm run <script>`.
  - name: packageManager
    type: string
    values:
      - npm
      - pnpm
    default: npm

  # Base URL of an Azure Artifacts universal feed (e.g. https://devdiv.pkgs.visualstudio.com/DevDiv/_packaging/azcode)
  # When set, FEED_BASE_URL, FEED_PAT, and PIP_INDEX_URL env vars are injected into the test step
  - name: feedBaseUrl
    type: string
    default: ""

resources:
  repositories:
    - repository: MicroBuildTemplate
      type: git
      name: 1ESPipelineTemplates/MicroBuildTemplate
      ref: refs/heads/release

extends:
  ${{ if eq(parameters.isOfficialBuild, true) }}:
    template: azure-pipelines/MicroBuild.1ES.Official.yml@MicroBuildTemplate
  ${{ else }}:
    template: azure-pipelines/MicroBuild.1ES.Unofficial.yml@MicroBuildTemplate

  parameters:
    sdl:
      ${{ if eq(parameters.isOfficialBuild, true) }}:
        tsa:
          enabled: true
      componentgovernance:
        directoryExclusionPatterns: "**/.vscode-test"
      codeql:
        excludePathPatterns: "**/.vscode-test, **/dist"

    pool: ${{ parameters.sdlPool }}

    stages:
      - template: ./stages/1es-stages.yml
        parameters:
          jobs: ${{ parameters.jobs }}
          buildPool: ${{ parameters.buildPool }}
          signType: ${{ parameters.signType }}
          alternativeSigningSteps: ${{ parameters.alternativeSigningSteps }}
          additionalSetupSteps: ${{ parameters.additionalSetupSteps }}
          testARMServiceConnection: ${{ parameters.testARMServiceConnection }}
          packageManager: ${{ parameters.packageManager }}
          feedBaseUrl: ${{ parameters.feedBaseUrl }}
