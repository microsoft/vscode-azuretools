parameters:
  # Set to enable tests with Azure federated credentials
  - name: testARMServiceConnection
    type: string

  # Package manager used to run the test script (npm or pnpm)
  - name: packageManager
    type: string
    default: npm

  # Base URL of an Azure Artifacts universal feed for test env vars
  - name: feedBaseUrl
    type: string

steps:
  - bash: |
      /usr/bin/Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
    displayName: "👉 Start X Virtual Frame Buffer"
    condition: and(succeeded(), eq(variables['Agent.OS'], 'Linux'))

  - ${{ if ne(parameters.testARMServiceConnection, '') }}:
      - task: AzureCLI@2
        displayName: "👉 Verify test service connection"
        inputs:
          azureSubscription: ${{ parameters.testARMServiceConnection }}
          scriptType: pscore
          scriptLocation: inlineScript
          addSpnToEnvironment: true
          inlineScript: |
            # FC_SERVICE_CONNECTION_ID is sourced from AZURESUBSCRIPTION_SERVICE_CONNECTION_ID set by the AzureCLI@2 task.
            # This behavior is not clearly documented, but was confirmed by the task developer as safe to rely on.
            Write-Host "##vso[task.setvariable variable=FC_SERVICE_CONNECTION_ID]$env:AZURESUBSCRIPTION_SERVICE_CONNECTION_ID"
            Write-Host "##vso[task.setvariable variable=FC_SERVICE_CONNECTION_CLIENT_ID]$env:servicePrincipalId"
            Write-Host "##vso[task.setvariable variable=FC_SERVICE_CONNECTION_TENANT_ID]$env:tenantId"

  - template: ./setup-nuget-configs.yml
    parameters:
      feedBaseUrl: ${{ parameters.feedBaseUrl }}

  - pwsh: ${{ parameters.packageManager }} run test
    displayName: "👉 Test"
    workingDirectory: $(working_directory)
    env:
      DISPLAY: :99 # Only necessary for Linux tests, must match Xvfb display number set above
      ${{ if ne(parameters.testARMServiceConnection, '') }}:
        SYSTEM_ACCESSTOKEN: $(System.AccessToken)
        FC_SERVICE_CONNECTION_NAME: ${{ parameters.testARMServiceConnection }}
        FC_SERVICE_CONNECTION_ID: $(FC_SERVICE_CONNECTION_ID)
        FC_SERVICE_CONNECTION_CLIENT_ID: $(FC_SERVICE_CONNECTION_CLIENT_ID)
        FC_SERVICE_CONNECTION_TENANT_ID: $(FC_SERVICE_CONNECTION_TENANT_ID)
        # Temporary: legacy env vars for old azure-pipelines template compatibility, needed until RGs is released
        AzCode_UseAzureFederatedCredentials: true
        AzCode_ServiceConnectionID: $(FC_SERVICE_CONNECTION_ID)
        AzCode_ServiceConnectionDomain: $(FC_SERVICE_CONNECTION_TENANT_ID)
        AzCode_ServiceConnectionClientID: $(FC_SERVICE_CONNECTION_CLIENT_ID)
      ${{ if ne(parameters.feedBaseUrl, '') }}:
        PIP_INDEX_URL: ${{ replace(parameters.feedBaseUrl, 'https://', 'https://build:$(System.AccessToken)@') }}/pypi/simple/
        FEED_BASE_URL: ${{ parameters.feedBaseUrl }}
        FEED_PAT: $(System.AccessToken)
