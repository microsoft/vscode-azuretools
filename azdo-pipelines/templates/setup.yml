parameters:
  - name: npmFeed
    type: string
    displayName: "Azure Artifacts feed to use (e.g. FeedName or ProjectName/FeedName)"
    default: ""

steps:
  - pwsh: |
      $nvmrcPath = "$(working_directory)/.nvmrc"
      if (-not (Test-Path $nvmrcPath)) {
        Write-Output "##vso[task.logissue type=error].nvmrc file not found in $(working_directory). Please add a .nvmrc file to the working directory."
        exit 1
      }
      $nodeVersion = (Get-Content $nvmrcPath).Trim()
      Write-Output "##vso[task.setvariable variable=nodeVersion]$nodeVersion"
    displayName: "👉 Read Node version from .nvmrc"

  - task: UseNode@1
    displayName: "👉 Using Node.js"
    inputs:
      version: $(nodeVersion)

  - pwsh: |
      if (Test-Path "$(working_directory)/.npmrc") {
        Write-Output "##vso[task.setvariable variable=npmrcExists]true"
      } else {
        Write-Output "##vso[task.setvariable variable=npmrcExists]false"
      }
    displayName: "👉 Check for .npmrc"

  - task: npmAuthenticate@0
    displayName: "👉 Authenticate NPM"
    condition: and(succeeded(), eq(variables['npmrcExists'], 'true'), eq('${{ parameters.npmFeed }}', ''))
    inputs:
      workingFile: $(working_directory)/.npmrc

  - task: Npm@1
    displayName: "👉 Install Dependencies"
    inputs:
      command: custom
      customCommand: ci --no-optional
      workingDir: $(working_directory)
      ${{ if ne(parameters.npmFeed, '') }}:
        customRegistry: useFeed
        customFeed: ${{ parameters.npmFeed }}
