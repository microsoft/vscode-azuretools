parameters:
  # The name or filename prefix of the package tarball to publish.
  # This is matched against .tgz files found in the build artifact using a wildcard/prefix pattern: <value>*.tgz.
  - name: packageToPublish
    type: string

  # The intended package version to publish.
  # This is used to verify the version in package.json matches the version to publish to avoid publishing the wrong package/version
  - name: publishVersion
    type: string

  # When true, skips the deployment job that actually publishes the package
  - name: dryRun
    type: boolean
    default: false

  # In the build artifacts, the name of the artifact containing the package to publish
  - name: artifactName
    type: string
    default: Build Root

  # ESRP release also requires owner aliases, though does not use them currently
  - name: ownerAliases
    type: string

  # ESRP release also requires approver aliases, though does not use them currently
  - name: approverAliases
    type: string

  # Azure Artifacts feed for an internal NPM mirror (e.g. FeedName or ProjectName/FeedName).
  # When set, the package is also published to this feed after the ESRP publish to npmjs.org succeeds.
  # Same-org feeds authenticate with the build identity, so no service connection is needed.
  - name: npmFeed
    type: string
    default: ""

  # The pool to use for releases
  - name: releasePool
    type: object
    default:
      name: VSEngSS-MicroBuild2022-1ES
      image: server2022-microbuildVS2022-1es
      os: windows

  # The GitHub service connection to use for creating the GitHub release (optional)
  - name: gitHubServiceConnection
    type: string
    default: ""

  # Set to the AzDO environment used for enforcing approval before the release runs
  - name: releaseApprovalEnvironment
    type: string
    default: ""

resources:
  repositories:
    - repository: MicroBuildTemplate
      type: git
      name: 1ESPipelineTemplates/MicroBuildTemplate
      ref: refs/heads/release

extends:
  template: azure-pipelines/MicroBuild.1ES.Official.Publish.yml@MicroBuildTemplate
  parameters:
    pool: ${{ parameters.releasePool }}
    stages:
      - stage: ReleaseStage
        displayName: Release NPM package
        jobs:
          - job: Publish
            displayName: Publish NPM package
            # TODO: not working, `jobs.job` doesn't support `environment`, only `jobs.deployment` does
            # ${{ if ne(parameters.releaseApprovalEnvironment, '') }}:
            #   environment: ${{ parameters.releaseApprovalEnvironment }}
            templateContext:
              type: releaseJob
              isProduction: true
              inputs:
                - input: pipelineArtifact
                  pipeline: build
                  targetPath: "$(System.DefaultWorkingDirectory)"
                  artifactName: "${{ parameters.artifactName }}"
            steps:
              - checkout: none

              - template: azdo-pipelines/templates/find-tarballs.yml@azExtTemplates
                parameters:
                  tarballName: ${{ parameters.packageToPublish }}
                  publishVersion: ${{ parameters.publishVersion }}

              - pwsh: |
                  $tarballList = @('$(tarballListJson)' | ConvertFrom-Json)
                  $tgzFolderName = $tarballList[0].directory
                  $tgzFileName = Join-Path $tgzFolderName $tarballList[0].tarballName
                  Write-Host "##vso[task.setvariable variable=tgzFolderName]$tgzFolderName"
                  Write-Host "##vso[task.setvariable variable=tgzFileName]$tgzFileName"
                displayName: "👉 Set variables for found tarball"

              - template: azdo-pipelines/templates/set-release-build-number.yml@azExtTemplates
                parameters:
                  packageToPublish: ${{ parameters.packageToPublish }}
                  publishVersion: ${{ parameters.publishVersion }}
                  dryRun: ${{ parameters.dryRun }}

              # Publish the package to NPM
              # NOTE: Template references don't support `condition:`, so dryRun must remain a compile-time check here
              - ${{ if eq(parameters.dryRun, false) }}:
                  - template: MicroBuild.Publish.yml@MicroBuildTemplate
                    parameters:
                      intent: PackageDistribution
                      contentType: npm
                      contentSource: Folder
                      folderLocation: "$(tgzFolderName)"
                      waitForReleaseCompletion: true
                      owners: "${{ parameters.ownerAliases }}"
                      approvers: "${{ parameters.approverAliases }}"
              - ${{ else }}:
                  - pwsh: Write-Host "Skipping NPM publish"
                    displayName: "👉 Publish NPM package (skipped - dry run)"
                    condition: false

              # (Optional) Publish the same tarball to an internal Azure Artifacts feed,
              # but only after the ESRP publish above has completed successfully.
              # NOTE: Template references / the npmAuthenticate task don't combine cleanly with
              # `condition:` for dryRun, so dryRun and npmFeed remain compile-time checks here.
              - ${{ if and(ne(parameters.npmFeed, ''), eq(parameters.dryRun, false)) }}:
                  - template: azdo-pipelines/templates/write-npmrc-auth.yml@azExtTemplates
                    parameters:
                      workingDirectory: $(tgzFolderName)
                      npmFeed: ${{ parameters.npmFeed }}
                      respectCheckedInNpmrc: false

                  - pwsh: |
                      npm publish "$(tgzFileName)" --userconfig "$(tgzFolderName)/.npmrc" --ignore-scripts
                      if ($LASTEXITCODE -ne 0) {
                          Write-Error "Failed to publish package to internal feed."
                          exit 1
                      }
                    displayName: "👉 Publish NPM package to internal feed"
                    workingDirectory: "$(tgzFolderName)"
                    condition: succeeded()

              # (Optional) Create a draft release on GitHub containing the package
              - ${{ if ne(parameters.gitHubServiceConnection, '') }}:
                  - task: GitHubRelease@1
                    displayName: "👉 Create draft release on GitHub"
                    condition: and(succeeded(), eq(${{ parameters.dryRun }}, false))
                    inputs:
                      gitHubConnection: ${{ parameters.gitHubServiceConnection }}
                      tagSource: userSpecifiedTag
                      tag: "${{ parameters.packageToPublish }}-v${{ parameters.publishVersion }}"
                      title: "${{ parameters.packageToPublish }} v${{ parameters.publishVersion }}"
                      releaseNotesSource: inline
                      assets: "$(tgzFileName)"
                      isDraft: true
                      isPreRelease: true
                      addChangeLog: false
